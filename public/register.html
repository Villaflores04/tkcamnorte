<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - TK Cam Norte</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="container">
    <button class="hamburger" id="hamburger">☰</button>
    <ul class="nav-links" id="navLinks"></ul>
    <div class="card" style="max-width: 400px; margin: 2rem auto;">
      <h2>Register</h2>
      <form id="registerForm">
        <input type="text" id="fullName" placeholder="Full Name" required>
        <input type="text" id="username" placeholder="Username (no email, unique)" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit" class="btn">Register</button>
      </form>
      <p>Already have an account? <a href="/login.html">Login</a></p>
    </div>
  </div>
  <script type="module">
    import { setToken, setUser, apiFetch, initHamburger, updateNav } from '/js/common.js';

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const fullName = document.getElementById('fullName').value;
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      const res = await apiFetch('/auth/register', {
        method: 'POST',
        body: JSON.stringify({ fullName, username, password })
      });

      if (res && res.ok) {
        const data = await res.json();
        setToken(data.token);
        setUser(data.user);
        alert('Registration successful!');
        window.location.href = '/';
      } else {
        const err = await res.json();
        alert(err.error || 'Registration failed');
      }
    });

    updateNav();
    initHamburger();
  </script>
</body>
</html>
