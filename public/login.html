<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - TK Cam Norte</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="container" style="max-width: 400px;">
    <div class="card">
      <h2>🔐 Login</h2>
      <form id="loginForm">
        <input type="text" id="username" placeholder="Username" required autocomplete="off">
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit" class="btn" style="width: 100%;">Login</button>
      </form>
      <p style="margin-top: 1rem;">No account? <a href="/register.html">Register here</a></p>
    </div>
  </div>
  <script type="module">
    import { setToken, setUser, apiFetch, redirectBasedOnRole } from '/js/common.js';

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      const res = await apiFetch('/auth/login', {
        method: 'POST',
        body: JSON.stringify({ username, password })
      });

      if (res && res.ok) {
        const data = await res.json();
        setToken(data.token);
        setUser(data.user);
        // Redirect based on role
        redirectBasedOnRole(data.user.role);
      } else {
        alert('Invalid username or password');
      }
    });
  </script>
</body>
</html>
