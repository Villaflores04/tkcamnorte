<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Login - TK Cam Norte</title>
  <!-- Google Fonts (modern) -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
  <!-- Main CSS (cyan theme + glassmorphism) -->
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="container" style="max-width: 480px;">
    <div class="card" style="text-align: center;">
      <h2 style="margin-bottom: 1rem;">🔐 Welcome Back</h2>
      <p style="color: var(--text-muted); margin-bottom: 2rem;">Login to TK Cam Norte announcements</p>
      
      <form id="loginForm">
        <input type="text" id="username" placeholder="Username" required autocomplete="off">
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit" class="btn" style="width: 100%; margin-top: 0.5rem;">Login</button>
      </form>
      
      <p style="margin-top: 1.5rem;">
        No account? <a href="/register.html" style="color: var(--cyan); text-decoration: none;">Register →</a>
      </p>
    </div>
  </div>

  <script type="module">
    import { setToken, setUser, apiFetch, redirectBasedOnRole } from '/js/common.js';

    const form = document.getElementById('loginForm');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      
      if (!username || !password) {
        alert('Please enter username and password');
        return;
      }
      
      const res = await apiFetch('/auth/login', {
        method: 'POST',
        body: JSON.stringify({ username, password })
      });
      
      if (res && res.ok) {
        const data = await res.json();
        setToken(data.token);
        setUser(data.user);
        // Redirect based on role (admin → /admin.html, user → /)
        redirectBasedOnRole(data.user.role);
      } else {
        alert('Invalid username or password');
      }
    });
  </script>
</body>
</html>
